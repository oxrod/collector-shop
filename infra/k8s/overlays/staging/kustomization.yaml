apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base
  - hpa.yaml

secretGenerator:
  - name: db-credentials
    literals:
      - username=marketplace
      - password=marketplace_staging
    options:
      disableNameSuffixHash: true
  - name: keycloak-credentials
    literals:
      - admin-password=admin
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: marketplace-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.marketplace.local
