apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base
  - hpa.yaml

images:
  # Staging images are environment-isolated to avoid overwriting dev/prod tags
  # in the same Minikube Docker daemon.
  - name: marketplace/backend
    newName: ghcr.io/oxrod/collector-shop/backend-staging
    newTag: latest
  - name: marketplace/frontend
    newName: ghcr.io/oxrod/collector-shop/frontend-staging
    newTag: latest
  - name: marketplace/fraud-service
    newName: ghcr.io/oxrod/collector-shop/fraud-service-staging
    newTag: latest
  - name: marketplace/notification-service
    newName: ghcr.io/oxrod/collector-shop/notification-service-staging
    newTag: latest
  - name: marketplace/keycloak
    newName: ghcr.io/oxrod/collector-shop/keycloak-staging
    newTag: latest

secretGenerator:
  - name: db-credentials
    literals:
      - username=marketplace
      - password=marketplace_staging
    options:
      disableNameSuffixHash: true
  - name: keycloak-credentials
    literals:
      - admin-password=admin
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: marketplace-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.marketplace.local
  - target:
      kind: Deployment
      name: keycloak
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KC_HOSTNAME
          value: "staging.marketplace.local"
