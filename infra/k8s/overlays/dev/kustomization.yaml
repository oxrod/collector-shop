apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

secretGenerator:
  - name: db-credentials
    literals:
      - username=marketplace
      - password=marketplace_secret
    options:
      disableNameSuffixHash: true
  - name: keycloak-credentials
    literals:
      - admin-password=admin
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
