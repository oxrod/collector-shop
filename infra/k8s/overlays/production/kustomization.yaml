apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base
  - hpa.yaml
  - network-policies.yaml

images:
  # Production images (no environment suffix).
  - name: marketplace/backend
    newName: ghcr.io/oxrod/collector-shop/backend
    newTag: latest
  - name: marketplace/frontend
    newName: ghcr.io/oxrod/collector-shop/frontend
    newTag: latest
  - name: marketplace/fraud-service
    newName: ghcr.io/oxrod/collector-shop/fraud-service
    newTag: latest
  - name: marketplace/notification-service
    newName: ghcr.io/oxrod/collector-shop/notification-service
    newTag: latest
  - name: marketplace/keycloak
    newName: ghcr.io/oxrod/collector-shop/keycloak
    newTag: latest

# Production secrets: use secretGenerator with env files or an external
# secret manager (e.g. Sealed Secrets, SOPS, Vault). The literals below
# are placeholders -- replace them before deploying to a real cluster.
secretGenerator:
  - name: db-credentials
    literals:
      - username=marketplace
      - password=CHANGE_ME_IN_PRODUCTION
    options:
      disableNameSuffixHash: true
  - name: keycloak-credentials
    literals:
      - admin-password=CHANGE_ME_IN_PRODUCTION
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: marketplace-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: marketplace.example.com
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - marketplace.example.com
            secretName: marketplace-tls
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: keycloak
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
