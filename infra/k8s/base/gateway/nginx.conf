# ============================================
# CollectorShop - Nginx API Gateway
# ============================================

events {
    worker_connections 1024;
}

http {
    client_max_body_size 10m;

    # ==== Rate Limiting (must be in http context) ====
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ==== Forwarded Headers Mapping ====
    map $http_x_forwarded_proto $forwarded_proto {
        default $scheme;
        ""      $scheme;
        ~.      $http_x_forwarded_proto;
    }

    map $http_x_forwarded_port $forwarded_port {
        default $server_port;
        ""      $server_port;
        ~.      $http_x_forwarded_port;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:3001;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    server {
        listen 80;
        server_name _;

        # ==== Security Headers ====
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ==== Keycloak ====
        location /auth/ {
            proxy_pass http://keycloak/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ==== Backend API ====
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        # ==== Frontend (Catch-all for SPA) ====
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;

            # WebSocket support for Vite HMR in development
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==== Health Check ====
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok"}';
        }
    }
}
