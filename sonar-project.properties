sonar.projectKey=oxrod_collector-shop
sonar.projectName=Marketplace Platform
sonar.projectVersion=1.0.0

sonar.sources=backend/src,fraud-service/src,notification-service/src
sonar.tests=backend/test,fraud-service/test,notification-service/test
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,fraud-service/coverage/lcov.info,notification-service/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,frontend/**

# Quality Gate: fail CI if SonarQube Quality Gate fails (configure gates in SonarQube server)
sonar.qualitygate.wait=true

sonar.organization=oxrod