global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "backend"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["backend:3001"]
    scrape_interval: 10s

  - job_name: "fraud-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["fraud-service:3002"]

  - job_name: "notification-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["notification-service:3003"]
