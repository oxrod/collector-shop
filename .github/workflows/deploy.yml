name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [master, dev, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      # Repo name carries the environment suffix.
      # master => production (no suffix), dev => development (-development), staging => staging (-staging)
      ENV_SUFFIX: ${{ github.event.workflow_run.head_branch == 'dev' && '-development' || github.event.workflow_run.head_branch == 'staging' && '-staging' || '' }}
    strategy:
      matrix:
        include:
          - service: backend
            context: backend
          - service: frontend
            context: frontend
          - service: fraud-service
            context: fraud-service
          - service: notification-service
            context: notification-service
          - service: keycloak
            context: auth
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: true

          # Repo name carries the environment suffix, tag is the commit SHA.
          # Kubernetes/ArgoCD deployments can be configured to track either `:latest`
          # or a specific SHA tag.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}${{ env.ENV_SUFFIX }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}${{ env.ENV_SUFFIX }}:latest

  # ——— Deploy Staging (Minikube + staging overlay + load tests) ———
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.event.workflow_run.head_branch == 'staging'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Deploy to Minikube Staging Namespace
        run: |
          echo "Simulating deployment to Minikube staging namespace..."# kubectl apply -k k8s/overlays/staging

  # ——— Deploy Production (Minikube + production overlay + load tests) ———
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.workflow_run.head_branch == 'master'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Deploy to Minikube Production Namespace
        run: |
          echo "Simulating deployment to Minikube production namespace..."# kubectl apply -k k8s/overlays/production

  # ——— Deploy Dev (Minikube + dev overlay + smoke tests) ———
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.workflow_run.head_branch == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to Minikube Dev Namespace
        run: |
          echo "Simulating deployment to Minikube dev namespace..."# kubectl apply -k k8s/overlays/dev

