name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        service: [backend, frontend, fraud-service, notification-service, auth]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  # ——— Deploy Staging (Minikube + staging overlay + load tests) ———
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.event.workflow_run.head_branch == 'master' ||
      github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          install minikube /usr/local/bin/minikube
          minikube start --driver=docker --cpus=2 --memory=4096

      - name: Enable ingress addon
        run: minikube addons enable ingress

      - name: Build images inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t marketplace/backend:latest ./backend
          docker build -t marketplace/frontend:latest ./frontend
          docker build -t marketplace/fraud-service:latest ./fraud-service
          docker build -t marketplace/notification-service:latest ./notification-service
          docker build -t marketplace/keycloak:latest ./auth

      - name: Deploy staging overlay
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k infra/k8s/overlays/staging

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/backend -n staging --timeout=180s
          kubectl rollout status deployment/frontend -n staging --timeout=180s
          echo "Staging deployment successful"

      - name: Install Siege
        run: sudo apt-get update && sudo apt-get install -y siege

      - name: Load test via ingress gateway
        continue-on-error: true
        run: |
          kubectl port-forward svc/ingress-nginx-controller 8080:80 -n ingress-nginx &
          PF_PID=$!

          echo "Waiting for ingress gateway..."
          sleep 10
          for i in $(seq 1 30); do
            curl -sf -H "Host: staging.marketplace.local" http://localhost:8080/api/health && break
            sleep 3
          done

          chmod +x tests/siege/run-load-tests.sh
          BACKEND_URL=http://localhost:8080 \
          FRAUD_URL=http://localhost:8080 \
          NOTIFICATION_URL=http://localhost:8080 \
          SIEGE_HEADER="Host: staging.marketplace.local" \
          GATEWAY_MODE=true \
          BASELINE_TIME=20S LOAD_TIME=30S STRESS_TIME=20S \
            tests/siege/run-load-tests.sh

          kill $PF_PID 2>/dev/null || true

      - name: Upload staging load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siege-staging-results
          path: tests/siege/results/

  # ——— Deploy Production (Minikube + production overlay + load tests) ———
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          install minikube /usr/local/bin/minikube
          minikube start --driver=docker --cpus=2 --memory=4096

      - name: Enable ingress addon
        run: minikube addons enable ingress

      - name: Build images inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t marketplace/backend:latest ./backend
          docker build -t marketplace/frontend:latest ./frontend
          docker build -t marketplace/fraud-service:latest ./fraud-service
          docker build -t marketplace/notification-service:latest ./notification-service
          docker build -t marketplace/keycloak:latest ./auth

      - name: Deploy production overlay
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k infra/k8s/overlays/production

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/backend -n production --timeout=180s
          kubectl rollout status deployment/frontend -n production --timeout=180s
          kubectl rollout status deployment/keycloak -n production --timeout=180s
          echo "Production deployment successful"

      - name: Install Siege
        run: sudo apt-get update && sudo apt-get install -y siege

      - name: Load test via ingress gateway
        continue-on-error: true
        run: |
          kubectl port-forward svc/ingress-nginx-controller 8080:80 -n ingress-nginx &
          PF_PID=$!

          echo "Waiting for ingress gateway..."
          sleep 10
          for i in $(seq 1 30); do
            curl -sf -H "Host: marketplace.example.com" http://localhost:8080/api/health && break
            sleep 3
          done

          chmod +x tests/siege/run-load-tests.sh
          BACKEND_URL=http://localhost:8080 \
          FRAUD_URL=http://localhost:8080 \
          NOTIFICATION_URL=http://localhost:8080 \
          SIEGE_HEADER="Host: marketplace.example.com" \
          GATEWAY_MODE=true \
          BASELINE_CONCURRENT=25 BASELINE_TIME=20S \
          LOAD_CONCURRENT=50 LOAD_TIME=30S \
          STRESS_CONCURRENT=100 STRESS_TIME=20S \
            tests/siege/run-load-tests.sh

          kill $PF_PID 2>/dev/null || true

      - name: Upload production load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siege-production-results
          path: tests/siege/results/

