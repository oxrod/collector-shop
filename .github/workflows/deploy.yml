name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        service: [backend, frontend, fraud-service, notification-service, auth]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.event.workflow_run.head_branch == 'master' ||
      github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image tags
        working-directory: infra/k8s/overlays/staging
        run: |
          kustomize edit set image \
            marketplace/backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:sha-${GITHUB_SHA::7} \
            marketplace/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:sha-${GITHUB_SHA::7} \
            marketplace/fraud-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fraud-service:sha-${GITHUB_SHA::7} \
            marketplace/notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:sha-${GITHUB_SHA::7} \
            marketplace/keycloak=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth:sha-${GITHUB_SHA::7}

      - name: Create namespace
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        run: kubectl apply -k infra/k8s/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n staging --timeout=120s
          kubectl rollout status deployment/frontend -n staging --timeout=120s
          echo "Staging deployment successful"

  # ——— Load Tests on Staging (post-deploy, via ingress gateway) ———
  load-test-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Siege
        run: sudo apt-get update && sudo apt-get install -y siege

      - name: Load test via ingress gateway
        run: |
          kubectl port-forward svc/ingress-nginx-controller 8080:80 -n ingress-nginx &
          PF_PID=$!

          echo "Waiting for ingress gateway..."
          sleep 5
          for i in $(seq 1 30); do
            curl -sf -H "Host: staging.marketplace.local" http://localhost:8080/api/health && break
            sleep 2
          done

          chmod +x tests/siege/run-load-tests.sh
          BACKEND_URL=http://localhost:8080 \
          FRAUD_URL=http://localhost:8080 \
          NOTIFICATION_URL=http://localhost:8080 \
          SIEGE_HEADER="Host: staging.marketplace.local" \
          GATEWAY_MODE=true \
          BASELINE_TIME=30S LOAD_TIME=60S STRESS_TIME=30S \
            tests/siege/run-load-tests.sh

          kill $PF_PID 2>/dev/null || true

      - name: Upload staging load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siege-staging-results
          path: tests/siege/results/

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image tags
        working-directory: infra/k8s/overlays/production
        run: |
          kustomize edit set image \
            marketplace/backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.ref_name }} \
            marketplace/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.ref_name }} \
            marketplace/fraud-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fraud-service:${{ github.ref_name }} \
            marketplace/notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:${{ github.ref_name }} \
            marketplace/keycloak=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth:${{ github.ref_name }}

      - name: Create namespace
        run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production
        run: kubectl apply -k infra/k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n production --timeout=120s
          kubectl rollout status deployment/frontend -n production --timeout=120s
          kubectl rollout status deployment/keycloak -n production --timeout=180s
          echo "Production deployment successful"

  # ——— Load Tests on Production (post-deploy, via ingress gateway) ———
  load-test-production:
    runs-on: ubuntu-latest
    needs: deploy-production
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Siege
        run: sudo apt-get update && sudo apt-get install -y siege

      - name: Load test via ingress gateway
        run: |
          kubectl port-forward svc/ingress-nginx-controller 8080:80 -n ingress-nginx &
          PF_PID=$!

          echo "Waiting for ingress gateway..."
          sleep 5
          for i in $(seq 1 30); do
            curl -sf -H "Host: marketplace.example.com" http://localhost:8080/api/health && break
            sleep 2
          done

          chmod +x tests/siege/run-load-tests.sh
          BACKEND_URL=http://localhost:8080 \
          FRAUD_URL=http://localhost:8080 \
          NOTIFICATION_URL=http://localhost:8080 \
          SIEGE_HEADER="Host: marketplace.example.com" \
          GATEWAY_MODE=true \
          BASELINE_CONCURRENT=25 BASELINE_TIME=30S \
          LOAD_CONCURRENT=50 LOAD_TIME=60S \
          STRESS_CONCURRENT=100 STRESS_TIME=30S \
            tests/siege/run-load-tests.sh

          kill $PF_PID 2>/dev/null || true

      - name: Upload production load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siege-production-results
          path: tests/siege/results/

