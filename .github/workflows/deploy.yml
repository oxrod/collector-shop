name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, fraud-service, notification-service, auth]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image tags
        working-directory: infra/k8s/overlays/staging
        run: |
          kustomize edit set image \
            marketplace/backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:sha-${GITHUB_SHA::7} \
            marketplace/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:sha-${GITHUB_SHA::7} \
            marketplace/fraud-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fraud-service:sha-${GITHUB_SHA::7} \
            marketplace/notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:sha-${GITHUB_SHA::7} \
            marketplace/keycloak=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth:sha-${GITHUB_SHA::7}

      - name: Create namespace
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        run: kubectl apply -k infra/k8s/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n staging --timeout=120s
          kubectl rollout status deployment/frontend -n staging --timeout=120s
          echo "Staging deployment successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image tags
        working-directory: infra/k8s/overlays/production
        run: |
          kustomize edit set image \
            marketplace/backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.ref_name }} \
            marketplace/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.ref_name }} \
            marketplace/fraud-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fraud-service:${{ github.ref_name }} \
            marketplace/notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:${{ github.ref_name }} \
            marketplace/keycloak=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth:${{ github.ref_name }}

      - name: Create namespace
        run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production
        run: kubectl apply -k infra/k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n production --timeout=120s
          kubectl rollout status deployment/frontend -n production --timeout=120s
          kubectl rollout status deployment/keycloak -n production --timeout=180s
          echo "Production deployment successful"
