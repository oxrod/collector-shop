name: CI Pipeline

on:
  push:
    branches: [master, dev, staging]
  pull_request:
    branches: [master]

jobs:
  # ——— Backend ———
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info

  # ——— Fraud Service ———
  fraud-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fraud-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fraud-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: fraud-service-coverage
          path: fraud-service/coverage/lcov.info

  # ——— Notification Service ———
  notification-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: notification-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: notification-service-coverage
          path: notification-service/coverage/lcov.info

  # ——— Integration (E2E) ———
  integration:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_URL: http://localhost:3001/api
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: test
      DB_PASSWORD: test
      DB_DATABASE: marketplace_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install and build backend
        run: |
          cd backend && npm ci && npm run build
      - name: Start backend and run E2E tests
        run: |
          cd backend && node dist/main.js &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health && break
            sleep 2
          done
          cd tests && npm install && npm test

  # ——— Load Testing (Siege) ———
  load-test:
    runs-on: ubuntu-latest
    needs: [backend, integration]
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: test
      DB_PASSWORD: test
      DB_DATABASE: marketplace_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Siege
        run: sudo apt-get update && sudo apt-get install -y siege

      - name: Install and build backend
        run: cd backend && npm ci && npm run build

      - name: Start backend
        run: |
          cd backend && node dist/main.js &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health && break
            sleep 2
          done

      - name: Run Siege load tests
        run: |
          chmod +x tests/siege/run-load-tests.sh
          BASELINE_TIME=30S LOAD_CONCURRENT=100 LOAD_TIME=60S STRESS_CONCURRENT=250 STRESS_TIME=30S \
            tests/siege/run-load-tests.sh

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siege-load-test-results
          path: tests/siege/results/

  # ——— Frontend ———
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ——— SonarCloud Analysis ———
  sonar:
    runs-on: ubuntu-latest
    needs: [backend, fraud-service, notification-service, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
      - uses: actions/download-artifact@v4
        with:
          name: fraud-service-coverage
          path: fraud-service/coverage
      - uses: actions/download-artifact@v4
        with:
          name: notification-service-coverage
          path: notification-service/coverage
      - uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
